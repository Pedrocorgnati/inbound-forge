# railway.toml — Inbound Forge
# Declaracao de services Railway. Provisionamento operacional documentado em
# output/docs/inbound-forge/project/DEPLOY.md.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"

[[services]]
name = "inbound-forge-web"
builder = "NIXPACKS"

[[services]]
name = "publishing-worker"
builder = "DOCKERFILE"
# Implementacao real em workers/publishing-worker (publica de fato por canal,
# com retry/backoff). O stub antigo em apps/publishing-worker foi REMOVIDO
# (finding WK-WRK-02): marcava PublishingQueue=DONE/Post=PUBLISHED com o publish
# comentado, publicando nada.
dockerfilePath = "workers/publishing-worker/Dockerfile"
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ALWAYS"
