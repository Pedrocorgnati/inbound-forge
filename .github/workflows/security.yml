# Security Audit — Inbound Forge
# Rastreabilidade: SEC-001, SEC-002, TASK-5/ST002
# Executa: dependency audit + secrets scan
# Schedule: segunda-feira 9h (UTC) + push para main

name: Security Audit

on:
  push:
    branches: [main]
  schedule:
    # Segunda-feira 9h UTC (SEC-002: auditoria semanal)
    - cron: '0 9 * * 1'
  workflow_dispatch:
    # Permitir execução manual

env:
  NODE_VERSION: '20'

jobs:
  dependency-audit:
    name: Dependency Audit (SEC-002)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (High/Critical)
        # SEC-002: falhar em vulnerabilidades High ou Critical
        run: npm audit --audit-level=high
        continue-on-error: true
        id: audit

      - name: Check audit result
        if: steps.audit.outcome == 'failure'
        run: |
          echo "::warning::Vulnerabilidades High/Critical encontradas em dependências (SEC-002)"
          echo "Executar: npm audit fix"
          npm audit --audit-level=high --json | jq '.vulnerabilities' || true
          exit 1

      - name: Upload Audit Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report
          path: npm-audit.json

  secrets-scan:
    name: Secrets Scan (SEC-001)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # TruffleHog precisa do histórico completo

      - name: TruffleHog Secrets Scan
        # SEC-001: detectar credenciais hardcoded ou em histórico git
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      - name: Verify .env not tracked
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "ERRO: .env está sendo rastreado pelo git! Remover com: git rm --cached .env"
            exit 1
          fi
          echo "OK: .env não está no repositório"

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check licenses
        run: |
          npx license-checker --onlyAllow 'MIT;ISC;Apache-2.0;BSD-2-Clause;BSD-3-Clause;CC0-1.0;CC-BY-3.0;CC-BY-4.0;0BSD;Python-2.0;Unlicense' \
            --excludePrivatePackages \
            --json > license-report.json || true
          echo "Relatório de licenças gerado"

      - name: Upload License Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: license-report
          path: license-report.json
