        "404":
          description: Post not found

  # ─── Leads (extended) ──────────────────────────────────────────────────
  /api/v1/leads/{id}/journey:
    get:
      tags: [Leads]
      summary: "Get lead journey timeline (module-13) — PA-01"
      description: |
        Retorna lista cronológica de eventos do lead:
        - `post-view`: primeiro contato com o conteúdo (inferido de firstTouchAt)
        - `utm-click`: clique no link UTM do post de first-touch (inferido se UTMLink existe)
        - `form-submit`: submissão do formulário (inferido de createdAt)
        - `conversion`: eventos de conversão registrados manualmente
        - `email-open`: requer infraestrutura de webhook de email (fora do escopo M12)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Lista de eventos de jornada
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      required: [id, type, occurredAt]
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                          enum: [post-view, utm-click, form-submit, conversion, email-open]
                        occurredAt:
                          type: string
                          format: date-time
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          description: Lead não encontrado

  /api/v1/leads/{id}/conversions:
    get:
      tags: [Leads]
      summary: "Get conversions for a specific lead (module-13)"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lead conversions
        "404":
          description: Lead not found
    post:
      tags: [Leads]
      summary: "Register a conversion for a lead (module-13)"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum: [MEETING, PROPOSAL, CONTRACT]
                notes:
                  type: string
      responses:
        "201":
          description: Conversion registered
        "404":
          description: Lead not found

components:
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: AUTH_001
            message: Authentication required

    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: VAL_001
            message: Validation failed
            field: lgpdConsent
