[build]
builder = "DOCKERFILE"
# Path relativo a raiz do repo (build context = repo root) para que o
# `COPY prisma ./prisma` alcance o schema canonico. Mesma convencao do
# scraping-worker. O Root Directory do service no painel Railway deve ficar
# VAZIO (= raiz do repo).
dockerfilePath = "workers/video-worker/Dockerfile"

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Variáveis de ambiente necessárias (configurar no painel Railway):
# DATABASE_URL             — Supabase PostgreSQL connection string
# UPSTASH_REDIS_REST_URL   — URL do Redis Upstash
# UPSTASH_REDIS_REST_TOKEN — Token do Redis Upstash
# NEXT_PUBLIC_SUPABASE_URL — URL pública do Supabase
# SUPABASE_SERVICE_ROLE_KEY — Service role key do Supabase
# SUPABASE_STORAGE_BUCKET  — Bucket para vídeos gerados
# WORKER_AUTH_TOKEN        — Token de autenticação do worker
# PORT                     — Porta do health server (default: 3002)
